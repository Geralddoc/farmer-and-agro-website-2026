<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmers Directory - Agro2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .directory-header {
            padding: 120px 0 40px;
            text-align: center;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0 4rem;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .data-table th {
            background: var(--primary-color);
            color: white;
            font-weight: 600;
        }

        .data-table tr:hover {
            background-color: #f8fafc;
        }

        .tag {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: #e8f5e9;
            color: var(--primary-dark);
            border-radius: 50px;
            font-size: 0.85rem;
            margin: 2px;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            font-size: 1.2rem;
            color: #666;
        }

        .error {
            text-align: center;
            padding: 2rem;
            color: #ff5252;
            background: #ffebee;
            border-radius: 8px;
            margin: 2rem 0;
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">Agro<span class="highlight">2026</span></a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="farmers.html" style="color: var(--primary-color)">Farmers</a></li>
                    <li><a href="processors.html">Processors</a></li>
                    <li><a href="import_data.html">Data Importer</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="directory-header">
        <div class="container">
            <h1>🧑‍🌾 Farmers Directory</h1>
            <p>Connect directly with registered farmers across the region.</p>
        </div>
    </div>

    <main class="container">
        <div id="status" class="loading">Fetching data from Convex Database...</div>
        <div id="tableContainer" style="overflow-x: auto;"></div>
    </main>

    <script>
        async function loadData() {
            const defaultConvexUrl = 'https://happy-otter-123.convex.cloud'; // Fallback
            let convexUrl = localStorage.getItem('convexUrl') || defaultConvexUrl;

            // Clean up the URL if they accidentally saved the /importData part
            if (convexUrl.endsWith('/importData')) {
                convexUrl = convexUrl.replace('/importData', '');
            }

            try {
                // Ensure the URL ends with the correct endpoint
                const fetchUrl = `${convexUrl.replace(/\/$/, '')}/getFarmers`;

                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();
                renderTable(data);
            } catch (error) {
                document.getElementById('status').innerHTML = `
                    <div class="error">
                        <strong>Error loading data:</strong> ${error.message} <br><br>
                        <em>Make sure you have imported the data via the Importer tool and that your Convex database is accessible.</em><br>
                        <em>Current attempted URL: ${convexUrl}/getFarmers</em>
                    </div>
                `;
            }
        }

        function renderTable(farmers) {
            if (!farmers || farmers.length === 0) {
                document.getElementById('status').innerHTML = "No farmers found in the database. Please use the Data Importer to upload records.";
                return;
            }

            document.getElementById('status').style.display = 'none';

            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Location</th>
                            <th>Contact</th>
                            <th>Districts</th>
                            <th>Commodities</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            farmers.forEach(f => {
                const districts = Array.isArray(f.districts) ? f.districts.map(d => `<span class="tag">${d}</span>`).join('') : f.districts;
                const commodities = Array.isArray(f.commodities) ? f.commodities.map(c => `<span class="tag">${c}</span>`).join('') : f.commodities;

                html += `
                    <tr>
                        <td><strong>${f.fullName || 'N/A'}</strong></td>
                        <td>${f.location || 'N/A'}</td>
                        <td>${f.contactNumber || 'N/A'}</td>
                        <td>${districts || '-'}</td>
                        <td>${commodities || '-'}</td>
                        <td><span class="tag" style="background: #e3f2fd; color: #1565c0;">${f.status || 'Active'}</span></td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            document.getElementById('tableContainer').innerHTML = html;
        }

        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>

</html>
